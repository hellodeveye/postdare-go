server:
  port: 8088
  cors_origins:
    - http://localhost:5173
    - http://localhost:5174

data_dir: "./data"

database:
  driver: sqlite
  path: ""
  dsn: ""

jwt:
  secret: "please-change-this-secret"
  expire_hours: 72

deploy:
  log_dir: ""
  command_timeout_minutes: 30

app_log:
  max_tail_lines: 500
  max_allowed_lines: 5000

mcp:
  enabled: true
  allow_mutation_tools: false
  api_token: "please-change-this-token"
